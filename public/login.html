<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — College Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-body">

  <div class="login-page">
    <a href="index.html" class="login-back">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
        <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back to home
    </a>

    <div class="login-card" id="loginCard">

      <div class="login-logo">
        <svg viewBox="0 0 32 32" fill="none" width="30" height="30">
          <path d="M16 3 3 10l13 7 13-7-13-7z" stroke="#C9A84C" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M3 22l13 7 13-7" stroke="#C9A84C" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M3 16l13 7 13-7" stroke="#C9A84C" stroke-width="2.2" stroke-linejoin="round"/>
        </svg>
        <span>College Navigator</span>
      </div>

      <h1 class="login-h1">Welcome</h1>
      <p class="login-sub">Sign in to access your personalized college guidance session.</p>

      <button class="google-btn" id="googleSignInBtn">
        <svg viewBox="0 0 48 48" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>

      <p class="login-error" id="loginError" style="display:none;"></p>

      <p class="login-note">No account needed — your Google account is all you need.<br/>We don't store your personal data.</p>
    </div>
  </div>

  <script type="module">
    import { auth, googleProvider, signInWithPopup, onAuthStateChanged } from './firebase-init.js';

    // Already signed in? Go straight to chat.
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = '/chat.html';
    });

    const btn      = document.getElementById('googleSignInBtn');
    const errorEl  = document.getElementById('loginError');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      btn.querySelector('span').textContent = 'Signing in…';
      errorEl.style.display = 'none';

      try {
        await signInWithPopup(auth, googleProvider);
        // onAuthStateChanged will fire and redirect
      } catch (err) {
        const messages = {
          'auth/popup-closed-by-user':       'Sign-in cancelled. Please try again.',
          'auth/popup-blocked':              'Popup was blocked. Please allow popups for this site.',
          'auth/cancelled-popup-request':    'Sign-in cancelled. Please try again.',
          'auth/network-request-failed':     'Network error. Check your connection and try again.',
        };
        errorEl.textContent = messages[err.code] || 'Sign-in failed. Please try again.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Sign in with Google';
      }
    });
  </script>

</body>
</html>
